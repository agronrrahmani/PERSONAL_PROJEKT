<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav class="navbar">
  <div class="logo">HYPE</div>

  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="shop.html">Shop</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="cart.html">Cart</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<section class="products">
  <h2>Your Cart 🛒</h2>

  <div class="product-grid" id="cart-items"></div>

  <h2 id="total" style="text-align:center; margin-top:30px;">
    Total: $0
  </h2>
</section>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function renderCart() {

  const cartItems = document.getElementById("cart-items");
  const totalText = document.getElementById("total");

  cartItems.innerHTML = "";

  let total = 0;

  if (cart.length === 0) {
    cartItems.innerHTML = "<p>Your cart is empty.</p>";
    totalText.innerHTML = "Total: $0";
    return;
  }

  cart.forEach((item, index) => {

    total += item.price;

    cartItems.innerHTML += `
      <div class="product-card">
        <img src="${item.image}">

        <div class="product-info">
          <h3>${item.name}</h3>
          <p>$${item.price}</p>

          <button class="btn" onclick="removeItem(${index})">
            Remove
          </button>
        </div>
      </div>
    `;
  });

  totalText.innerHTML = `Total: $${total}`;
}

function removeItem(index) {

  cart.splice(index, 1);

  localStorage.setItem("cart", JSON.stringify(cart));

  renderCart();
}

renderCart();

</script>

</body>
</html>
