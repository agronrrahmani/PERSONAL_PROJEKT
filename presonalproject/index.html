<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HYPE Streetwear</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav class="navbar">
  <div class="logo">HYPE</div>

  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="shop.html">Shop</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="cart.html">Cart</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<section class="hero">
  <div class="hero-content">
    <h1>Streetwear Redefined</h1>
    <p>Modern fashion for bold people.</p>
    <a href="shop.html" class="btn">Shop Now</a>
  </div>
</section>

<section class="products">

  <h2>Products</h2>

  <div class="product-grid">

    <!-- HOODIE -->

    <div class="product-card">

      <a href="#hoodie-popup">
        <img src="images/hoodie.png">
      </a>

      <div class="product-info">

        <h3>Hoodie</h3>

        <p>$59</p>

        <a href="cart.html" class="btn">
          Add to Cart
        </a>

      </div>

    </div>

    <div id="hoodie-popup" class="popup">

      <a href="#" class="close"></a>

      <img src="images/hoodie.png">

    </div>

    <!-- SNEAKERS -->

    <div class="product-card">

      <a href="#sneakers-popup">
        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
      </a>

      <div class="product-info">

        <h3>Sneakers</h3>

        <p>$89</p>

        <a href="cart.html" class="btn">
          Add to Cart
        </a>

      </div>

    </div>

    <div id="sneakers-popup" class="popup">

      <a href="#" class="close"></a>

      <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">

    </div>

    <!-- JACKET -->

    <div class="product-card">

      <a href="#jacket-popup">
        <img src="images/streetjacked.png">
      </a>

      <div class="product-info">

        <h3>Street Jacket</h3>

        <p>$74</p>

        <a href="cart.html" class="btn">
          Add to Cart
        </a>

      </div>

    </div>

    <div id="jacket-popup" class="popup">

      <a href="#" class="close"></a>

      <img src="images/streetjacked.png">

    </div>

  </div>

</section>

<script>

function addToCart(name, price, image) {

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  cart.push({
    name: name,
    price: price,
    image: image
  });

  localStorage.setItem("cart", JSON.stringify(cart));

  alert(name + " added to cart!");
}

</script>

<div class="image-popup" id="popup">

  <img id="popup-img">

</div>

</body>
</html>
