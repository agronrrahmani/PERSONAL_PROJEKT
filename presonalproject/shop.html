<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav class="navbar">
  <div class="logo">HYPE</div>

  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="shop.html">Shop</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="cart.html">Cart</a></li>
  </ul>
</nav>

<section class="products">
  <h2>All Products</h2>

  <div class="product-grid">

    <div class="product-card">
      <img src="images/hoodie.png">

      <div class="product-info">
        <h3>Hoodie</h3>
        <p>$59</p>

        <button class="btn"
        onclick="addToCart('Hoodie', 59, 'images/hoodie.png')">
          Add to Cart
        </button>
      </div>
    </div>

    <div class="product-card">
      <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">

      <div class="product-info">
        <h3>Sneakers</h3>
        <p>$89</p>

        <button class="btn"
        onclick="addToCart('Sneakers', 89, 'https://images.unsplash.com/photo-1542291026-7eec264c27ff')">
          Add to Cart
        </button>
      </div>
    </div>

    <div class="product-card">
      <img src="images/streetjacked.png">

      <div class="product-info">
        <h3>Street Jacket</h3>
        <p>$74</p>

        <button class="btn"
        onclick="addToCart('Street Jacket', 74, 'images.png')">
          Add to Cart
        </button>
      </div>
    </div>

  </div>
</section>

<script>
function addToCart(name, price, image) {

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  cart.push({
    name: name,
    price: price,
    image: image
  });

  localStorage.setItem("cart", JSON.stringify(cart));

  alert(name + " added to cart!");
}
</script>

</body>
</html>
